services:
  db:
    image: postgres:16-alpine
    container_name: task-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: task-manager-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Task Manager API
      DEBUG: "false"
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://taskuser:taskpassword@db:5432/taskmanager
      ALLOWED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
