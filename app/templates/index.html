<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager API</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="hero-bg"></div>
  <main class="container py-4 py-lg-5">
    <section class="hero card border-0 shadow-lg mb-4">
      <div class="card-body p-4 p-lg-5">
        <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-end">
          <div>
            <p class="eyebrow mb-2">Task Manager API</p>
            <h1 class="display-6 fw-bold mb-2">Track work with a clean FastAPI + PostgreSQL stack.</h1>
            <p class="text-secondary mb-0">Create, update, complete, and delete tasks from a responsive interface backed by production-style APIs.</p>
          </div>
          <div class="text-lg-end">
            <span id="healthBadge" class="badge rounded-pill text-bg-secondary px-3 py-2">Checking health...</span>
          </div>
        </div>
      </div>
    </section>

    <div id="alertContainer"></div>

    <div class="row g-4">
      <div class="col-12 col-xl-4">
        <section class="card shadow-sm border-0 h-100">
          <div class="card-body p-4">
            <h2 class="h4 fw-semibold mb-3" id="formTitle">Create Task</h2>
            <form id="taskForm" class="needs-validation" novalidate>
              <input type="hidden" id="taskId">
              <div class="mb-3">
                <label for="title" class="form-label">Title</label>
                <input type="text" id="title" class="form-control" maxlength="255" required minlength="3">
                <div class="invalid-feedback">Title is required and must be at least 3 characters.</div>
              </div>
              <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea id="description" class="form-control" rows="4" maxlength="2000"></textarea>
              </div>
              <div class="mb-3">
                <label for="priority" class="form-label">Priority</label>
                <select id="priority" class="form-select" required>
                  <option value="low">Low</option>
                  <option value="medium" selected>Medium</option>
                  <option value="high">High</option>
                </select>
              </div>
              <div class="mb-3 d-none" id="statusGroup">
                <label for="status" class="form-label">Status</label>
                <select id="status" class="form-select">
                  <option value="pending">Pending</option>
                  <option value="completed">Completed</option>
                </select>
              </div>
              <div class="d-flex gap-2">
                <button type="submit" id="submitBtn" class="btn btn-primary flex-grow-1">Create Task</button>
                <button type="button" id="cancelBtn" class="btn btn-outline-secondary d-none">Cancel</button>
              </div>
            </form>
          </div>
        </section>
      </div>

      <div class="col-12 col-xl-8">
        <section class="card shadow-sm border-0">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div>
                <h2 class="h4 fw-semibold mb-1">Tasks</h2>
                <p class="text-secondary mb-0" id="taskCount">Loading tasks...</p>
              </div>
              <button class="btn btn-outline-primary" id="refreshBtn">Refresh</button>
            </div>
            <div id="taskList" class="task-grid"></div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
